<!DOCTYPE html>
<html>
<head>
  <title>Counsel Connect Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBoCSSJbhEFkcmWZapzRPZf9ozKDLmrRy",
      authDomain: "counsel-connect-1dd40.firebaseapp.com",
      projectId: "counsel-connect-1dd40",
      storageBucket: "counsel-connect-1dd40.appspot.com",
      messagingSenderId: "203610249780",
      appId: "1:203610249780:web:986c26c4d0b57882d14861"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
  </script>

  <style>
    body {
      font-family: Arial;
      background: #0b1f3a;
      color: white;
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border-radius: 10px;
      border: none;
    }

    .primary { background: #1e3a8a; color: white; }
    .success { background: #16a34a; color: white; }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>

<div id="home">
  <h2>Counsel Connect</h2>

  <button onclick="selectDoc('Affidavit')">Affidavit</button>
  <button onclick="selectDoc('Rent Agreement')">Rent Agreement</button>
  <button onclick="selectDoc('Non Disclosure Agreement')">Non-Disclosure Agreement</button>
</div>

<div id="form" style="display:none;">
  <h2 id="docTitle"></h2>

  <input id="name" placeholder="Full Name"/>
  <input id="phone" placeholder="Phone Number"/>
  <input id="parent" placeholder="Father/Mother Name"/>
  <input id="address" placeholder="Full Address"/>
  <input id="idproof" placeholder="ID Proof"/>
  <input id="purpose" placeholder="Purpose"/>
  <input id="otherparty" placeholder="Other Party"/>

  <textarea id="additional" placeholder="Additional Details"></textarea>

  <button class="primary" onclick="saveData()">Submit</button>
</div>

<div id="success" style="display:none;">
  <h3>✅ Your request has been successfully submitted</h3>
  <p>Our team will contact you shortly.</p>

  <button class="success" onclick="openWhatsApp()">Continue on WhatsApp</button>
</div>

<script>
let docType = "";

// 🔥 Two WhatsApp numbers
const numbers = ["919599413556", "919873299521"];

function selectDoc(type){
  docType = type;
  document.getElementById("home").style.display = "none";
  document.getElementById("form").style.display = "block";
  document.getElementById("docTitle").innerText = type;
}

function saveData(){

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    parent: document.getElementById("parent").value,
    address: document.getElementById("address").value,
    idproof: document.getElementById("idproof").value,
    purpose: document.getElementById("purpose").value,
    otherparty: document.getElementById("otherparty").value,
    additional: document.getElementById("additional").value,
    document: docType,
    createdAt: new Date()
  };

  addDoc(collection(window.db, "orders"), data)
    .then(() => {
      console.log("✅ Data saved to Firebase");
      alert("Your details have been submitted successfully!");

      document.getElementById("form").style.display = "none";
      document.getElementById("success").style.display = "block";
    })
    .catch((error) => {
      console.error(error);
      alert("Error saving data");
    });
}

// 🔥 WhatsApp logic (random assignment)
function openWhatsApp(){

  const selectedNumber = numbers[Math.floor(Math.random() * numbers.length)];

  const name = document.getElementById("name").value;

  const message = `Hello, I have submitted a request for ${docType}. Name: ${name}`;

  window.open(`https://wa.me/${selectedNumber}?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
