<!DOCTYPE html>
<html>
<head>
  <title>Counsel Connect Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBoCSSJbhEFkcmWZapzRPZf9ozKDLmrRy",
      authDomain: "counsel-connect-1dd40.firebaseapp.com",
      projectId: "counsel-connect-1dd40",
      storageBucket: "counsel-connect-1dd40.appspot.com",
      messagingSenderId: "203610249780",
      appId: "1:203610249780:web:986c26c4d0b57882d14861"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0b1f3a;
      color: #ffffff;
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .logo {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #1e3a8a, #d4af37);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .tagline {
      font-style: italic;
      color: #d4af37;
    }

    .card {
      background: #ffffff;
      color: #111827;
      padding: 16px;
      border-radius: 16px;
      margin-top: 12px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border-radius: 12px;
      border: none;
    }

    .primary { background: #1e3a8a; color: white; }
    .gold { background: #d4af37; color: black; }
    .success { background: #16a34a; color: white; }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    .trust {
      font-size: 13px;
      margin-top: 10px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>

<div id="home">
  <div class="header">
    <div class="logo">CC</div>
    <h1>Counsel Connect</h1>
  </div>

  <div class="tagline">Where Every Document Stands on Trust</div>

  <div class="card" onclick="selectDoc('Affidavit')">Affidavit</div>
  <div class="card" onclick="selectDoc('Rent Agreement')">Rent Agreement</div>
  <div class="card" onclick="selectDoc('Non Disclosure Agreement')">Non-Disclosure Agreement</div>
</div>

<div id="form" style="display:none;">
  <h2 id="docTitle"></h2>

  <input id="name" placeholder="Full Name"/>
  <input id="phone" placeholder="Phone Number"/>
  <input id="parent" placeholder="Father/Mother Name"/>
  <input id="address" placeholder="Full Address"/>
  <input id="idproof" placeholder="ID Proof"/>
  <input id="purpose" placeholder="Purpose of Document"/>
  <input id="otherparty" placeholder="Other Party (if any)"/>

  <textarea id="additional" placeholder="Additional Details (optional)"></textarea>

  <button class="primary" onclick="goToPayment()">Proceed</button>
</div>

<div id="payment" style="display:none;">
  <button class="gold" onclick="pay(29900)">Pay ₹299</button>
</div>

<div id="success" style="display:none;">
  <h3>✅ Done</h3>
  <a id="waLink" target="_blank">
    <button class="success">WhatsApp</button>
  </a>
</div>

<script>
let docType = "";

function selectDoc(type){
  docType = type;
  document.getElementById("home").style.display = "none";
  document.getElementById("form").style.display = "block";
  document.getElementById("docTitle").innerText = type;
}

function goToPayment(){
  document.getElementById("form").style.display = "none";
  document.getElementById("payment").style.display = "block";
}

function pay(amount){
  var options = {
    key: "YOUR_RAZORPAY_KEY",
    amount: amount,
    currency: "INR",
    name: "Counsel Connect Docs",
    handler: function (){
      saveData();
    }
  };
  new Razorpay(options).open();
}

function saveData(){

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    parent: document.getElementById("parent").value,
    address: document.getElementById("address").value,
    idproof: document.getElementById("idproof").value,
    purpose: document.getElementById("purpose").value,
    otherparty: document.getElementById("otherparty").value,
    additional: document.getElementById("additional").value,
    document: docType,
    createdAt: new Date()
  };

  addDoc(collection(window.db, "orders"), data)
    .then(() => {
      document.getElementById("payment").style.display = "none";
      document.getElementById("success").style.display = "block";

      document.getElementById("waLink").href =
        "https://wa.me/91YOURNUMBER?text=" + encodeURIComponent(`Order for ${docType}`);
    })
    .catch(err => alert(err));
}
</script>

</body>
</html>
