<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Counsel Connect - Affidavits</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
</script>

<style>
body {
margin: 0;
font-family: Arial;
background: #071224;
color: white;
max-width: 500px;
margin: auto;
padding: 20px;
}

.card {
background: white;
color: black;
padding: 15px;
border-radius: 12px;
margin-top: 12px;
cursor: pointer;
}

.card.selected {
border: 2px solid #1d4ed8;
}

.plan-card {
background: white;
color: black;
padding: 15px;
border-radius: 12px;
margin-top: 12px;
cursor: pointer;
}

.plan-card.selected {
border: 2px solid #1d4ed8;
background: #e0ecff;
box-shadow: 0 10px 25px rgba(29,78,216,0.3);
}

input, textarea {
width: 100%;
padding: 12px;
margin-top: 10px;
border-radius: 10px;
border: none;
}

button {
width: 100%;
padding: 14px;
margin-top: 14px;
border-radius: 10px;
border: none;
font-weight: bold;
}

.primary { background: gold; color: black; }
.secondary { background: #444; color: white; }
</style>
</head>

<body>

<div id="home">
<h2>Select Affidavit</h2>

<div class="card" onclick="selectDoc('Gap Year Affidavit')">Gap Year Affidavit</div>
<div class="card" onclick="selectDoc('Address Proof Affidavit')">Address Proof Affidavit</div>
</div>

<div id="step1" style="display:none;">
<h3 id="docTitle"></h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">

<button class="primary" onclick="nextStep()">Continue</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="step2" style="display:none;">
<h3>Complete Details</h3>

<input id="parent" placeholder="Parent Name">
<input id="address" placeholder="Address">
<input id="idproof" placeholder="ID Proof">
<input id="purpose" placeholder="Purpose">

<textarea id="additional" placeholder="Additional"></textarea>

<h3>Select Plan</h3>

<div class="plan-card selected" id="plan-Fast" onclick="selectPlan('Fast')">
₹99 (2 hours)
</div>

<div class="plan-card" id="plan-Express" onclick="selectPlan('Express')">
₹199 (30 mins)
</div>

<button class="primary" onclick="proceedPayment()">Get My Draft Now</button>
<button class="secondary" onclick="goBackStep1()">Back</button>
</div>

<div id="success" style="display:none;">
<h3 id="successMsg"></h3>
<button onclick="openWhatsApp()">WhatsApp</button>
</div>

<script>
let docType = "";
let plan = "Fast";

function selectDoc(type){
docType = type;
document.getElementById("home").style.display = "none";
document.getElementById("step1").style.display = "block";
document.getElementById("docTitle").innerText = type;
}

function goHome(){
document.getElementById("step1").style.display = "none";
document.getElementById("home").style.display = "block";
}

function goBackStep1(){
document.getElementById("step2").style.display = "none";
document.getElementById("step1").style.display = "block";
}

function nextStep(){
document.getElementById("step1").style.display = "none";
document.getElementById("step2").style.display = "block";
}

function selectPlan(p){
plan = p;

document.querySelectorAll(".plan-card").forEach(el=>{
el.classList.remove("selected");
});

document.getElementById("plan-"+p).classList.add("selected");
}

function proceedPayment(){

const options = {
key: "YOUR_RAZORPAY_KEY",
amount: plan === "Fast" ? 9900 : 19900,
currency: "INR",
name: "Counsel Connect",
description: docType,

prefill: {
name: document.getElementById("name").value,
contact: document.getElementById("phone").value
},

handler: function(){
saveData();
}
};

new Razorpay(options).open();
}

function generatePDF(data){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

doc.setFont("Times","Normal");
doc.setFontSize(12);

doc.text("AFFIDAVIT",105,20,null,null,"center");

doc.text(`I, ${data.name},`,20,40);
doc.text(`child of ${data.parent},`,20,50);
doc.text(`residing at ${data.address},`,20,60);

doc.text(`do hereby solemnly affirm:`,20,80);

doc.text(`1. That ${data.purpose}`,20,100);

doc.text(``,20,140);
doc.text(`DEPONENT`,150,180);

doc.save("CounselConnect_Affidavit.pdf");
}

function saveData(){

const data = {
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
parent: document.getElementById("parent").value,
address: document.getElementById("address").value,
idproof: document.getElementById("idproof").value,
purpose: document.getElementById("purpose").value,
additional: document.getElementById("additional").value,
document: docType,
plan: plan,
createdAt: new Date()
};

addDoc(collection(window.db,"orders"),data).then(()=>{
generatePDF(data);

document.getElementById("step2").style.display = "none";
document.getElementById("success").style.display = "block";

document.getElementById("successMsg").innerText = "Your affidavit is ready!";
});
}

function openWhatsApp(){
const num = "919599413556";
const message = "I submitted affidavit request";
window.open(`https://wa.me/${num}?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
